spring:
  datasource:
    url: jdbc:sqlite:${SQLITE_DB_PATH:./tableorder.db}
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
        dialect: org.hibernate.community.dialect.SQLiteDialect
    open-in-view: false
  mvc:
    async:
      request-timeout: 1800000

jwt:
  secret: ${JWT_SECRET:dev-secret-key-minimum-32-characters-long}
  admin-expiration: 28800000   # 8시간 (ms)
  table-expiration: 43200000   # 12시간 (ms)

admin:
  username: ${ADMIN_USERNAME:admin}
  password: ${ADMIN_PASSWORD:admin1234}

logging:
  level:
    com.tableorder: DEBUG
    org.hibernate.SQL: DEBUG
