spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

jwt:
  secret: test-secret-key-minimum-32-characters-long
  admin-expiration: 28800000
  table-expiration: 43200000

admin:
  username: admin
  password: admin1234

logging:
  level:
    com.tableorder: WARN
