version: '3.8'

# SQLite를 사용하므로 별도 DB 컨테이너가 필요 없습니다.
# 로컬 실행은 build-instructions.md를 참고하세요.

services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SQLITE_DB_PATH: /data/tableorder.db
      JWT_SECRET: ${JWT_SECRET:-default-dev-secret-key-change-in-production}
      JWT_ADMIN_EXPIRATION: ${JWT_ADMIN_EXPIRATION:-28800000}
      JWT_TABLE_EXPIRATION: ${JWT_TABLE_EXPIRATION:-43200000}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
    volumes:
      - sqlite-data:/data

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    depends_on:
      - backend

volumes:
  sqlite-data:
